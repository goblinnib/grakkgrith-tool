const frame=document.getElementById('frame'),statusEl=document.getElementById('status'),notice=document.getElementById('notice');
let mode='',playerReady=false,pendingState=null,currentUrl='',acceptPlayerState=false;
function getState(){try{const raw=localStorage.getItem(TOOL_KEY);if(raw)return JSON.parse(raw);for(const oldKey of OLD_TOOL_KEYS){const old=localStorage.getItem(oldKey);if(old){const parsed=JSON.parse(old);localStorage.setItem(TOOL_KEY,JSON.stringify(parsed));return parsed}}for(const k of ['adyta_offline_inventory_v44_shared','adyta_offline_inventory_v43_shared','adyta_offline_inventory_v42_shared']){const x=localStorage.getItem(k);if(x)return JSON.parse(x)}}catch(e){}return null}
function setState(s){pendingState=s;try{localStorage.setItem(TOOL_KEY,JSON.stringify(s));}catch(e){}statusEl.textContent=(s&&s.character&&s.character.name)?'SAVED · '+s.character.name:'SAVED'}
function setDoc(html,nextMode){if(currentUrl)URL.revokeObjectURL(currentUrl);currentUrl=URL.createObjectURL(new Blob([html],{type:'text/html'}));mode=nextMode;playerReady=false;acceptPlayerState=false;frame.src=currentUrl;statusEl.textContent=nextMode==='creator'?'CREATION MODE':'LOADING SHEET…'}
function showCreator(reset=false){if(reset)frame.addEventListener('load',()=>frame.contentWindow.postMessage({type:'grakkgrith-reset-creator'},'*'),{once:true});setDoc(CREATOR_HTML,'creator')}
function showPlayer(state){if(state)setState(state);setDoc(PLAYER_HTML,'player')}
function toast(t){notice.textContent=t;notice.style.display='block';clearTimeout(toast.t);toast.t=setTimeout(()=>notice.style.display='none',3200)}
function clearAllData(){pendingState=null;acceptPlayerState=false;playerReady=false;const keys=[TOOL_KEY,...OLD_TOOL_KEYS,'adyta_offline_inventory_v44_shared','adyta_offline_inventory_v43_shared','adyta_offline_inventory_v42_shared','grakkgrith_character_creator_v2','grakkgrith_character_creator_v1'];for(const k of keys){try{localStorage.removeItem(k)}catch(e){}}}
window.addEventListener('message',e=>{const m=e.data||{};
 if(m.type==='grakkgrith-character-complete'){setState(m.state);showPlayer(m.state);toast('Character created. You are now in Play Mode.')}
 else if(m.type==='grakkgrith-player-ready'){playerReady=true;const s=pendingState||getState();if(s)frame.contentWindow.postMessage({type:'grakkgrith-load-state',state:s},'*');acceptPlayerState=true;statusEl.textContent=s?.character?.name?'PLAY MODE · '+s.character.name:'PLAY MODE'}
 else if(m.type==='grakkgrith-player-state'){if(playerReady&&acceptPlayerState)setState(m.state)}
 else if(m.type==='grakkgrith-reset-all'){clearAllData();showCreator(true);toast('Character and local data deleted. Creation Mode is clean.')}
});
document.getElementById('sheetBtn').onclick=()=>{const s=getState();if(s)showPlayer(s);else{toast('Create a character first.');showCreator(false)}};
document.getElementById('creatorBtn').onclick=()=>showCreator(false);
document.getElementById('newBtn').onclick=()=>{if(!confirm('Start a new character? Your current character remains saved until you finish the new one.'))return;showCreator(true)};
const initial=getState();if(initial)showPlayer(initial);else showCreator(false);
</script>
</body></html>
